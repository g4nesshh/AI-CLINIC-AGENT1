<!DOCTYPE html>
<html>

<head>

<title>AI Clinic Assistant</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.header{
background:#2c7be5;
color:white;
padding:15px;
text-align:center;
font-size:18px;
border-top-left-radius:10px;
border-top-right-radius:10px;
}

.chat{
height:350px;
overflow-y:auto;
padding:10px;
}

.message{
margin:8px 0;
}

.user{
text-align:right;
color:#333;
}

.ai{
text-align:left;
color:#2c7be5;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
border:none;
padding:12px;
font-size:14px;
}

button{
background:#2c7be5;
color:white;
border:none;
padding:12px 18px;
cursor:pointer;
}

button:hover{
background:#1a5ed9;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
Clinic AI Assistant
</div>

<div id="chat" class="chat"></div>

<div class="input-area">

<input id="msg" placeholder="Type your message..." />

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("msg")
const message = input.value.trim()

if(message === "") return

const chat = document.getElementById("chat")

chat.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`

input.value = ""

chat.scrollTop = chat.scrollHeight

const response = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
})

const data = await response.json()

chat.innerHTML += `<div class="message ai"><b>AI:</b> ${data.reply}</div>`

chat.scrollTop = chat.scrollHeight

}

</script>

</body>

</html>
