<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0ea5e9;--brand-dark:#0284c7;--brand-soft:#e0f2fe;
  --bg:#f0f4f8;--white:#fff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--shadow:0 2px 12px rgba(14,165,233,.07);
  --green:#10b981;--red:#ef4444;--warn:#f59e0b;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);padding:32px 20px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;width:280px;height:280px;background:rgba(255,255,255,.06);border-radius:50%;top:-60px;right:-50px;pointer-events:none}
.header-inner{position:relative;z-index:1}
.clinic-icon{width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;backdrop-filter:blur(4px)}
.clinic-name{font-size:24px;font-weight:700;color:white;letter-spacing:-.5px;margin-bottom:6px}
.clinic-tagline{font-size:13.5px;color:rgba(255,255,255,.8);margin-bottom:18px;line-height:1.5;max-width:320px;margin-left:auto;margin-right:auto}
.header-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.header-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:5px 13px;font-size:12px;color:white}

/* BOOK CTA */
.book-cta{display:flex;margin:16px;background:white;border-radius:16px;padding:16px 20px;box-shadow:0 8px 28px rgba(14,165,233,.18);align-items:center;justify-content:space-between;gap:12px;cursor:pointer;border:none;width:calc(100% - 32px);font-family:inherit;transition:all .2s;text-decoration:none}
.book-cta:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(14,165,233,.25)}
.book-cta-left{text-align:left}
.book-cta-sublabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.book-cta-text{font-size:16px;font-weight:700;color:var(--brand)}
.book-cta-icon{width:44px;height:44px;background:var(--brand);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* CONTAINER + CARDS */
.container{padding:0 14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-badge{font-size:12px;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:99px;border:1px solid var(--border)}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr}
.info-cell{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.info-cell:nth-child(2n){border-right:none}
.info-cell:nth-last-child(-n+2){border-bottom:none}
.info-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.info-value{font-size:13.5px;font-weight:500;line-height:1.4}

/* SLOTS */
.date-scroll{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.date-scroll::-webkit-scrollbar{display:none}
.date-pill{padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;color:var(--text);transition:all .15s;text-align:center;line-height:1.4}
.date-pill:hover{border-color:var(--brand);color:var(--brand)}
.date-pill.active{background:var(--brand);border-color:var(--brand);color:white}
.date-pill small{display:block;font-size:10px;opacity:.8;margin-top:1px}
.custom-row{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.custom-row label{font-size:12px;color:var(--muted);white-space:nowrap}
.date-input{padding:7px 11px;border-radius:8px;border:1.5px solid var(--border);font-family:inherit;font-size:12.5px;outline:none;color:var(--text);flex:1;transition:border-color .15s}
.date-input:focus{border-color:var(--brand)}
.slots-body{padding:14px}
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.slot-btn{padding:10px 4px;border-radius:9px;border:1.5px solid #bae6fd;background:#f0f9ff;font-family:'JetBrains Mono',monospace;font-size:12px;color:#0369a1;cursor:pointer;transition:all .15s;text-align:center;font-weight:500;line-height:1.2}
.slot-btn:hover{background:var(--brand);border-color:var(--brand);color:white;transform:translateY(-1px)}
.slots-msg{text-align:center;padding:24px 16px;color:var(--muted);font-size:13.5px;line-height:1.6}
.slots-closed{background:#fff8f0;border-radius:10px;padding:16px;text-align:center;color:#92400e;font-size:13px;line-height:1.6}

/* DOCTORS */
.doctor-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border)}
.doctor-row:last-child{border-bottom:none}
.doctor-av{width:46px;height:46px;border-radius:12px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.doctor-info{flex:1;min-width:0}
.doctor-name{font-size:14px;font-weight:600;margin-bottom:3px}
.doctor-spec{font-size:12px;color:var(--brand);margin-bottom:3px}
.doctor-days{font-size:11.5px;color:var(--muted)}
.doctor-btn{padding:7px 14px;border:1.5px solid var(--brand);border-radius:9px;background:transparent;color:var(--brand);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.doctor-btn:hover{background:var(--brand);color:white}

/* SERVICES */
.services-wrap{display:grid;grid-template-columns:1fr 1fr}
.service-item{padding:13px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.service-item:nth-child(2n){border-right:none}
.service-item:hover{background:var(--brand-soft)}
.service-emoji{font-size:18px;flex-shrink:0}
.service-name{font-size:13px;font-weight:500}
.service-dur{font-size:11px;color:var(--muted);margin-top:2px}

/* CONTACT */
.contact-item{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background .15s}
.contact-item:last-child{border-bottom:none}
.contact-item:hover{background:var(--bg)}
.contact-ic{width:38px;height:38px;border-radius:10px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.contact-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.contact-val{font-size:13.5px;font-weight:500;color:var(--brand)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;padding:10px 14px;gap:10px;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.bnav-btn{flex:1;padding:11px;border-radius:11px;border:none;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;text-decoration:none}
.bnav-primary{background:var(--brand);color:white}
.bnav-primary:hover{background:var(--brand-dark)}
.bnav-ghost{background:var(--brand-soft);color:var(--brand)}
.bnav-ghost:hover{background:#bae6fd}

/* SKELETON */
.sk{background:linear-gradient(90deg,#e2e8f0 25%,#f0f4f8 50%,#e2e8f0 75%);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ALERT BOX */
.alert{margin:14px;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.6;display:flex;gap:12px;align-items:flex-start}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-error{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
</style>
</head>
<script>
// Register service worker for PWA + push notifications
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {})
}
</script>
<body>

<!-- HEADER (populated by JS) -->
<div class="header">
  <div class="header-inner">
    <div class="clinic-icon" id="clinic-icon">🏥</div>
    <div class="clinic-name" id="clinic-name">Loading…</div>
    <div class="clinic-tagline" id="clinic-tagline"> </div>
    <div class="header-pills" id="header-pills"></div>
  </div>
</div>

<!-- BOOK CTA -->
<a class="book-cta" id="book-cta" href="/chat.html?prefill=book%20appointment">
  <div class="book-cta-left">
    <div class="book-cta-sublabel">Ready to visit?</div>
    <div class="book-cta-text">Book an Appointment →</div>
  </div>
  <div class="book-cta-icon">📅</div>
</a>

<!-- MAIN CONTENT -->
<div class="container" id="main-content">
  <!-- Skeleton cards while loading -->
  <div class="card"><div style="padding:16px;display:flex;flex-direction:column;gap:10px">
    <div class="sk" style="height:13px;width:40%"></div>
    <div class="sk" style="height:13px;width:70%"></div>
    <div class="sk" style="height:13px;width:55%"></div>
  </div></div>
  <div class="card"><div style="padding:16px"><div class="sk" style="height:120px;border-radius:10px"></div></div></div>
  <div class="card"><div style="padding:16px"><div class="sk" style="height:80px;border-radius:10px"></div></div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a class="bnav-btn bnav-ghost" href="/chat.html">💬 Chat</a>
  <a class="bnav-btn bnav-primary" href="/chat.html?prefill=book%20appointment">📅 Book Now</a>
</div>

<script>
/* ── CONFIG ── */
const API_URL = 'https://ai-clinic-backend-xe19.onrender.com'

/* ── SERVICE ICONS — works for any clinic type ── */
const ICONS = {
  'checkup':'🦷','tooth cleaning':'✨','teeth cleaning':'✨','cleaning':'✨',
  'root canal':'🔧','braces':'😁','whitening':'⭐','extraction':'🩺',
  'filling':'🔩','crown':'👑','implant':'🦿','scaling':'🪥',
  'consultation':'💬','general consultation':'💬','general':'🩺',
  'follow up':'📋','follow-up':'📋','review':'📋',
  'blood test':'🩸','blood work':'🩸','injection':'💉',
  'vaccine':'💉','vaccination':'💉','flu shot':'💉',
  'dressing':'🩹','wound care':'🩹','ecg':'❤️',
  'ultrasound':'🔬','scan':'🔬','mri':'🧲','ct scan':'🧲',
  'eye test':'👁️','vision test':'👁️','glasses':'👓',
  'cataract':'💡','retina':'👁️','lasik':'👁️',
  'skin':'🧴','acne':'🧴','dermatology':'🧴','facial':'💆','laser':'✨',
  'physiotherapy':'🏃','physio':'🏃','orthopedic':'🦴',
  'fracture':'🦴','joint':'🦴','spine':'🦴',
  'x-ray':'🔬','xray':'🔬','x ray':'🔬',
  'pediatric':'👶','child':'👶','kids':'👶',
  'gynecology':'🌸','ent':'👂','cardiology':'❤️','neurology':'🧠',
  'default':'💊'
}

function getIcon(name) {
  const k = (name || '').toLowerCase().trim()
  if (ICONS[k]) return ICONS[k]
  const match = Object.keys(ICONS).filter(x => x !== 'default').find(key => k.includes(key))
  return match ? ICONS[match] : ICONS.default
}

function to12hr(t) {
  if (!t) return ''
  const [h, m] = String(t).split(':').map(Number)
  return `${h % 12 || 12}:${String(m || 0).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`
}

function fmtDate(d)  { return d.toISOString().split('T')[0] }
function esc(s)      { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') }
function chatLink(msg) { return '/chat.html?prefill=' + encodeURIComponent(msg) }

/* ── LOAD ALL CLINIC DATA ── */
async function loadAll() {
  try {
    const controller = new AbortController()
    const timeout    = setTimeout(() => controller.abort(), 12000)

    const res = await fetch(API_URL + '/public/clinic-info', { signal: controller.signal })
    clearTimeout(timeout)

    if (!res.ok) throw new Error('Server returned ' + res.status)
    const { config, doctors, services } = await res.json()

    renderHeader(config)
    renderPage(config, doctors, services)

  } catch(e) {
    renderHeader({ clinic_name: 'Our Clinic', clinic_icon: '🏥', clinic_tagline: '' })

    const isTimeout = e.name === 'AbortError'
    document.getElementById('main-content').innerHTML = `
      <div class="alert alert-warn">
        <div class="alert-icon">${isTimeout ? '⏳' : '⚠️'}</div>
        <div>
          <strong>${isTimeout ? 'Server is starting up…' : 'Could not load clinic info'}</strong><br>
          ${isTimeout
            ? 'Our server takes ~30 seconds to wake up. Please refresh the page in a moment.'
            : 'Please check your connection and try again.'
          }<br><br>
          <button onclick="location.reload()" style="padding:7px 16px;background:var(--brand);color:white;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">
            🔄 Refresh
          </button>
        </div>
      </div>
      ${renderSlots()}
      `
    setupDatePills(null)
    console.error('loadAll error:', e.message)
  }
}

/* ── HEADER ── */
function renderHeader(cfg) {
  document.title = cfg.clinic_name || 'Our Clinic'
  document.getElementById('clinic-icon').textContent    = cfg.clinic_icon    || '🏥'
  document.getElementById('clinic-name').textContent    = cfg.clinic_name    || 'Our Clinic'
  document.getElementById('clinic-tagline').textContent = cfg.clinic_tagline || ''

  const oh = to12hr(String(cfg.open_hour  || 10).padStart(2, '0') + ':00')
  const ch = to12hr(String(cfg.close_hour || 17).padStart(2, '0') + ':00')

  document.getElementById('header-pills').innerHTML =
    `<span class="header-pill">⏰ ${oh} – ${ch}</span>` +
    `<span class="header-pill">📅 ${esc(cfg.open_days || 'Mon–Sat')}</span>`
}

/* ── RENDER ALL SECTIONS ── */
function renderPage(config, doctors, services) {
  document.getElementById('main-content').innerHTML =
    buildInfoCard(config) +
    renderSlots() +
    (doctors.length  ? buildDoctorsCard(doctors)  : '') +
    (services.length ? buildServicesCard(services) : '') +
    buildContactCard(config)

  setupDatePills(config)
}

/* ── CLINIC INFO CARD ── */
function buildInfoCard(cfg) {
  const oh = to12hr(String(cfg.open_hour  || 10).padStart(2, '0') + ':00')
  const ch = to12hr(String(cfg.close_hour || 17).padStart(2, '0') + ':00')
  return `
  <div class="card">
    <div class="card-head"><div class="card-title">🏥 Clinic Info</div></div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Open Hours</div><div class="info-value">${oh} – ${ch}</div></div>
      <div class="info-cell"><div class="info-label">Open Days</div><div class="info-value">${esc(cfg.open_days || 'Mon–Sat')}</div></div>
      <div class="info-cell"><div class="info-label">Slot Duration</div><div class="info-value">${cfg.slot_duration || 30} min</div></div>
      <div class="info-cell"><div class="info-label">Max / Day</div><div class="info-value">${cfg.max_per_day || 20} appointments</div></div>
    </div>
  </div>`
}

/* ── SLOTS CARD SHELL ── */
function renderSlots() {
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">📅 Available Slots</div>
      <div class="card-badge" id="slots-badge"></div>
    </div>
    <div class="date-scroll" id="date-pills"></div>
    <div class="custom-row">
      <label>Pick date:</label>
      <input type="date" class="date-input" id="date-custom" onchange="loadSlots(this.value, null)">
    </div>
    <div class="slots-body">
      <div id="slots-container" class="slots-msg">Select a date to see available slots</div>
    </div>
  </div>`
}

/* ── DATE PILLS SETUP ── */
function setupDatePills(config) {
  const pillsEl = document.getElementById('date-pills')
  const inputEl = document.getElementById('date-custom')
  if (!pillsEl) return

  const today    = new Date(); today.setHours(0, 0, 0, 0)
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
  let html = ''

  for (let i = 0; i < 8; i++) {
    const d    = new Date(today); d.setDate(d.getDate() + i)
    const date = fmtDate(d)
    const top  = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : dayNames[d.getDay()]
    html += `<button class="date-pill" data-date="${date}" onclick="loadSlots('${date}', this)">
      ${top}<small>${d.getDate()}/${d.getMonth() + 1}</small>
    </button>`
  }

  pillsEl.innerHTML = html
  if (inputEl) inputEl.min = fmtDate(today)

  // Auto-load today
  const first = pillsEl.querySelector('.date-pill')
  if (first) loadSlots(fmtDate(today), first)
}

/* ── LOAD SLOTS ── */
async function loadSlots(date, btn) {
  if (!date) return

  document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'))
  if (btn) btn.classList.add('active')
  const customInput = document.getElementById('date-custom')
  if (customInput) customInput.value = date

  const container = document.getElementById('slots-container')
  const badge     = document.getElementById('slots-badge')
  if (!container) return

  container.innerHTML = '<div class="slots-msg">⏳ Loading slots…</div>'
  if (badge) badge.textContent = ''

  try {
    const res  = await fetch(`${API_URL}/public/public-slots?date=${date}`)
    const data = await res.json()

    if (!data.open) {
      container.innerHTML = `<div class="slots-closed">
        🗓️ Clinic is closed on this date${data.reason === 'holiday' ? ' (holiday)' : ''}.<br>
        <small>Please pick another date.</small>
      </div>`
      if (badge) badge.textContent = 'Closed'
      return
    }

    if (!data.slots || !data.slots.length) {
      container.innerHTML = `<div class="slots-msg">
        😔 No available slots on this date.<br>
        <small style="color:var(--muted)">Try another date or chat with us.</small>
      </div>`
      if (badge) badge.textContent = '0 available'
      return
    }

    if (badge) badge.textContent = data.slots.length + ' available'
    container.innerHTML =
      `<div class="slots-grid">` +
      data.slots.map(s =>
        `<a class="slot-btn" href="${chatLink('I would like to book at ' + s + ' on ' + date)}">${to12hr(s)}</a>`
      ).join('') +
      `</div>`

  } catch(e) {
    container.innerHTML = '<div class="slots-msg">⚠️ Could not load slots. Try again.</div>'
  }
}

/* ── DOCTORS CARD ── */
function buildDoctorsCard(doctors) {
  const rows = doctors.map(d => {
    const days = (d.available_days || '').split(',').map(x => x.trim()).join(' · ')
    return `<div class="doctor-row">
      <div class="doctor-av">👨‍⚕️</div>
      <div class="doctor-info">
        <div class="doctor-name">${esc(d.name)}</div>
        <div class="doctor-spec">${esc(d.specialization)}</div>
        <div class="doctor-days">📅 ${esc(days)}</div>
      </div>
      <a class="doctor-btn" href="${chatLink('I would like to book an appointment with ' + d.name)}">Book</a>
    </div>`
  }).join('')

  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">👨‍⚕️ Our Doctors</div>
      <div class="card-badge">${doctors.length} available</div>
    </div>
    ${rows}
  </div>`
}

/* ── SERVICES CARD ── */
function buildServicesCard(services) {
  const items = services.map(s =>
    `<a class="service-item" href="${chatLink('I would like to book a ' + s.name)}" style="text-decoration:none;color:inherit">
      <div class="service-emoji">${getIcon(s.name)}</div>
      <div>
        <div class="service-name">${esc(s.name)}</div>
        <div class="service-dur">${s.duration_minutes} min</div>
      </div>
    </a>`
  ).join('')

  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">💊 Our Services</div>
      <div class="card-badge">${services.length} offered</div>
    </div>
    <div class="services-wrap">${items}</div>
  </div>`
}

/* ── CONTACT CARD ── */
function buildContactCard(cfg) {
  const items = []
  if (cfg.clinic_phone)   items.push({ href: `tel:${cfg.clinic_phone}`,                                  icon:'📞', label:'Phone',    val: cfg.clinic_phone })
  if (cfg.whatsapp)       items.push({ href: `https://wa.me/${cfg.whatsapp.replace(/\D/g,'')}`,          icon:'💬', label:'WhatsApp', val: cfg.whatsapp })
  if (cfg.clinic_email)   items.push({ href: `mailto:${cfg.clinic_email}`,                               icon:'📧', label:'Email',    val: cfg.clinic_email })
  if (cfg.clinic_address) items.push({ href: cfg.google_maps || '#',                                     icon:'📍', label:'Address',  val: cfg.clinic_address })
  if (cfg.clinic_website) items.push({ href: cfg.clinic_website,                                         icon:'🌐', label:'Website',  val: cfg.clinic_website })

  if (!items.length) return ''

  return `
  <div class="card">
    <div class="card-head"><div class="card-title">📞 Contact Us</div></div>
    ${items.map(i => `
    <a class="contact-item" href="${esc(i.href)}" target="${i.href.startsWith('http') ? '_blank' : '_self'}" rel="noopener">
      <div class="contact-ic">${i.icon}</div>
      <div>
        <div class="contact-label">${i.label}</div>
        <div class="contact-val">${esc(i.val)}</div>
      </div>
    </a>`).join('')}
  </div>`
}

loadAll()
</script>
</body>
</html>
