<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicAI — Book Your Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f0f4f8;
  --white:      #ffffff;
  --brand:      #0ea5e9;
  --brand-dark: #0284c7;
  --brand-soft: #e0f2fe;
  --text:       #0f172a;
  --muted:      #94a3b8;
  --border:     #e2e8f0;
  --user-bg:    #0ea5e9;
  --user-text:  #ffffff;
  --ai-bg:      #f8fafc;
  --shadow:     0 20px 60px rgba(14,165,233,0.12), 0 4px 16px rgba(0,0,0,0.06);
  --slot-bg:    #f0f9ff;
  --slot-border:#bae6fd;
  --slot-hover: #0ea5e9;
  --slot-sel:   #0ea5e9;
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 500px; height: 500px;
  background: rgba(14,165,233,0.1);
  top: -100px; left: -100px;
}
body::after {
  width: 400px; height: 400px;
  background: rgba(16,185,129,0.08);
  bottom: -80px; right: -80px;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  animation: riseIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
  transform: translateY(24px);
}

@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

.card {
  background: var(--white);
  border-radius: 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  height: 620px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.8);
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  padding: 20px 22px 18px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  top: -80px; right: -40px;
}
.header-top { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.2);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  backdrop-filter: blur(4px);
  flex-shrink: 0;
}
.header-info h2 { font-size: 15px; font-weight: 600; color: white; letter-spacing: -0.3px; }
.header-info p  { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.online-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  animation: blink 2s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.chips { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
.chip {
  padding: 5px 12px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 99px;
  font-size: 11.5px;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}
.chip:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── BUBBLES ── */
.msg-row {
  display: flex;
  gap: 8px;
  animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-row.user-row { flex-direction: row-reverse; }
.msg-icon {
  width: 30px; height: 30px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ai-icon   { background: var(--brand-soft); }
.user-icon { background: var(--brand); }

.bubble {
  max-width: 82%;
  padding: 11px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.55;
}
.ai-bubble {
  background: var(--ai-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.user-bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-bottom-right-radius: 4px;
}
.bubble-time {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
}
.user-row .bubble-time { color: rgba(255,255,255,0.6); }

/* ── SLOT PICKER ── */
.slot-wrapper {
  display: flex;
  gap: 8px;
  animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
}

.slot-card {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 12px 14px 14px;
  max-width: 82%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.slot-label {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.5;
}

.slot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}

.slot-btn {
  padding: 8px 4px;
  background: var(--slot-bg);
  border: 1.5px solid var(--slot-border);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: #0369a1;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  font-weight: 500;
  position: relative;
  overflow: hidden;
}

.slot-btn:hover {
  background: var(--slot-hover);
  border-color: var(--slot-hover);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(14,165,233,0.25);
}

.slot-btn:active { transform: scale(0.96); }

.slot-btn.selected {
  background: var(--slot-sel);
  border-color: var(--slot-sel);
  color: white;
  box-shadow: 0 4px 12px rgba(14,165,233,0.3);
}

.slot-btn.selected::after {
  content: '✓';
  position: absolute;
  top: 2px; right: 5px;
  font-size: 9px;
  font-family: sans-serif;
}

.slot-time { font-size: 13px; }
.slot-period { font-size: 10px; opacity: 0.75; display: block; margin-top: 1px; }

.slot-bubble-time {
  font-size: 10.5px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ── TYPING ── */
.typing-row { display: flex; gap: 8px; align-items: flex-end; }
.typing-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 12px 16px;
  display: flex; gap: 4px; align-items: center;
}
.dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ── DATE DIVIDER ── */
.date-divider {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; color: var(--muted); margin: 4px 0;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── INPUT ── */
.input-area { padding: 12px 14px 14px; border-top: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-row:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
textarea {
  flex: 1; border: none; background: transparent;
  font-family: 'Sora', sans-serif;
  font-size: 13.5px; color: var(--text);
  resize: none; outline: none;
  line-height: 1.5; max-height: 100px; min-height: 22px; overflow-y: auto;
}
textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 36px; height: 36px;
  background: var(--brand); border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.send-btn:hover  { background: var(--brand-dark); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.input-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

/* ── QUICK REPLIES ── */
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;padding:6px 16px 10px;animation:popIn .2s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.qr-btn{padding:8px 16px;background:var(--brand-soft);border:1.5px solid var(--brand);border-radius:99px;font-family:'Sora',sans-serif;font-size:12.5px;color:var(--brand-dark);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.qr-btn:hover{background:var(--brand);color:white;border-color:var(--brand)}

/* ── DATE PICKER ── */
.date-picker-ui{padding:10px 16px 12px;animation:popIn .2s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.dp-pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.dp-pills::-webkit-scrollbar{display:none}
.dp-pill{flex-shrink:0;padding:8px 12px;background:var(--brand-soft);border:1.5px solid var(--brand);border-radius:10px;font-family:'Sora',sans-serif;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;border:none}
.dp-pill:hover{background:var(--brand)}
.dp-pill-top{font-size:12.5px;font-weight:600;color:var(--brand-dark);display:block}
.dp-pill:hover .dp-pill-top,.dp-pill:hover .dp-pill-bot{color:white}
.dp-pill-bot{font-size:10.5px;color:var(--muted);display:block}
.dp-custom{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.dp-custom-label{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.dp-input{flex:1;min-width:140px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:12.5px;outline:none;color:var(--text);transition:border-color .15s}
.dp-input:focus{border-color:var(--brand)}
.dp-go{padding:7px 14px;background:var(--brand);color:white;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.dp-go:hover{background:var(--brand-dark)}

/* ── SERVICE PICKER ── */
.service-picker{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:6px 16px 10px;animation:popIn .2s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.svc-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--brand-soft);border:1.5px solid var(--brand);border-radius:11px;font-family:'Sora',sans-serif;cursor:pointer;transition:all .15s;text-align:left}
.svc-btn:hover{background:var(--brand)}
.svc-icon{font-size:18px;flex-shrink:0}
.svc-name{font-size:12.5px;font-weight:600;color:var(--brand-dark);display:block;line-height:1.3}
.svc-btn:hover .svc-name,.svc-btn:hover .svc-dur{color:white}
.svc-dur{font-size:10.5px;color:var(--muted);display:block}


</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    // Ask for push permission after first booking confirmed
    window._swReg = reg
  }).catch(() => {})
}
</script>
<body>

<div class="wrapper">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <div class="header-top">
        <div class="avatar">🏥</div>
        <div class="header-info">
          <h2>ClinicAI Receptionist</h2>
          <p><span class="online-dot"></span> Online — here to help</p>
        </div>
      </div>
      <div class="chips">
        <div class="chip" onclick="quickSend('Book an appointment')">📅 Book Appointment</div>
        <div class="chip" onclick="quickSend('What are your clinic hours?')">🕐 Clinic Hours</div>
        <div class="chip" onclick="quickSend('What services do you offer?')">💊 Services</div>
        <div class="chip" onclick="window.location.href='/'">🏥 About Us</div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="date-divider">Today</div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="msg"
          placeholder="Type your message…"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" id="mic-btn" onclick="toggleVoice()" title="Voice input" style="background:var(--brand-soft);margin-right:4px">
          <svg viewBox="0 0 24 24" style="fill:var(--brand);width:16px;height:16px"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V22h-2v-4.07z"/></svg>
        </button>
        <button class="send-btn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint" id="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>

  </div>
</div>

<script>

// ── CHANGE THIS to your Render backend URL after deploying ──
const API_URL = ''  // Same server — works on any domain

const userId     = Math.random().toString(36).substring(2)
const messagesEl = document.getElementById('messages')

/* ── WELCOME ── */
window.addEventListener('load', () => {
  // Pre-fetch services so service picker is instant
  fetch(API_URL + '/public/clinic-info')
    .then(r => r.json())
    .then(d => { cachedServices = d.services || [] })
    .catch(() => {})

  setTimeout(() => {
    addMessage('ai', 'Hello! 👋 I\'m your clinic assistant. I can help with:\n\n📅 Book, cancel or reschedule appointments\n🏥 Clinic info — hours, doctors, services\n💊 Medical questions — symptoms, treatments, medicines\n💬 General health advice\n\nAsk me anything!')
    addQuickReplies([
      { label: '📅 Book Appointment', value: 'book appointment' },
      { label: '🕐 Clinic Hours',     value: 'What are your clinic hours?' },
      { label: '💊 Services',         value: 'What services do you offer?' },
      { label: '🔍 My Appointments',  value: 'check my appointment' },
    ])

    // Handle prefill from clinic page
    const params  = new URLSearchParams(window.location.search)
    const prefill = params.get('prefill')
    if (prefill) {
      setTimeout(() => {
        removeExtras()
        document.getElementById('msg').value = decodeURIComponent(prefill)
        send()
      }, 500)
    }
  }, 400)
})

/* ── TIME HELPERS ── */
function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
}

function to12hr(t) {
  const [h, m] = t.split(':').map(Number)
  const period = h >= 12 ? 'PM' : 'AM'
  const h12    = h % 12 || 12
  return { display: `${h12}:${m.toString().padStart(2,'0')}`, period }
}

/* ── ADD TEXT MESSAGE ── */
function addMessage(type, text) {
  const row  = document.createElement('div')
  row.className = `msg-row ${type === 'user' ? 'user-row' : ''}`

  const icon = document.createElement('div')
  icon.className = `msg-icon ${type === 'ai' ? 'ai-icon' : 'user-icon'}`
  icon.textContent = type === 'ai' ? '🤖' : '👤'

  const right  = document.createElement('div')
  const bubble = document.createElement('div')
  bubble.className = `bubble ${type === 'ai' ? 'ai-bubble' : 'user-bubble'}`
  bubble.textContent = text

  const timeEl = document.createElement('div')
  timeEl.className = 'bubble-time'
  timeEl.textContent = nowTime()

  right.appendChild(bubble)
  right.appendChild(timeEl)

  if (type === 'ai') { row.appendChild(icon); row.appendChild(right) }
  else               { row.appendChild(right); row.appendChild(icon) }

  messagesEl.appendChild(row)
  scrollBottom()
}

/* ── ADD SLOT PICKER ── */
function addSlotPicker(labelText, slots, slotDate) {
  const wrapper = document.createElement('div')
  wrapper.className = 'slot-wrapper'

  const icon = document.createElement('div')
  icon.className = 'msg-icon ai-icon'
  icon.textContent = '🤖'

  const card = document.createElement('div')
  card.className = 'slot-card'

  const label = document.createElement('div')
  label.className = 'slot-label'
  label.textContent = labelText
  card.appendChild(label)

  const grid = document.createElement('div')
  grid.className = 'slot-grid'

  slots.forEach(slot => {
    const btn = document.createElement('button')
    btn.className = 'slot-btn'

    const t = to12hr(slot)
    btn.innerHTML = `<span class="slot-time">${t.display}</span><span class="slot-period">${t.period}</span>`

    btn.onclick = () => {
      grid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      const msg = slotDate
        ? `I'd like to book at ${slot} on ${slotDate}`
        : slot
      setTimeout(() => sendSlot(msg, slot), 200)
    }

    grid.appendChild(btn)
  })

  card.appendChild(grid)

  const timeEl = document.createElement('div')
  timeEl.className = 'slot-bubble-time'
  timeEl.textContent = nowTime()
  card.appendChild(timeEl)

  wrapper.appendChild(icon)
  wrapper.appendChild(card)
  messagesEl.appendChild(wrapper)
  scrollBottom()
}

/* ── SEND SLOT SELECTION ── */
async function sendSlot(message, displayTime) {
  addMessage('user', `Selected: ${displayTime}`)
  showTyping()

  try {
    const res  = await fetch(API_URL + '/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message, userId })
    })
    const data = await res.json()
    hideTyping()
    handleResponse(data)
  } catch (e) {
    hideTyping()
    addMessage('ai', 'Sorry, could not connect to the server. Please try again.')
  }
}

/* ── HANDLE SERVER RESPONSE ── */
function handleResponse(data) {
  const action = data.action || (data.slots && data.slots.length > 0 ? 'show_slots' : 'chat')

  switch (action) {

    case 'show_slots':
      addMessage('ai', data.reply)
      addSlotPicker(null, data.slots, data.slotDate || null)
      break

    case 'show_summary':
      addMessage('ai', data.reply)
      addQuickReplies([
        { label: '✅ Yes, confirm', value: 'yes' },
        { label: '❌ No, change something', value: 'no' }
      ])
      break

    case 'confirmed':
      addMessage('ai', data.reply)
      // Check if deposit payment is required
      checkAndShowPayment(data)
      addQuickReplies([
        { label: '📅 Book another', value: 'book appointment' },
        { label: '🔍 Check appointments', value: 'check my appointment' }
      ])
      break

    case 'cancelled':
      addMessage('ai', data.reply)
      addQuickReplies([
        { label: '📅 Book new appointment', value: 'book appointment' },
        { label: '🔍 Check appointments', value: 'check my appointment' }
      ])
      break

    case 'ask_name':
      addMessage('ai', data.reply)
      break

    case 'ask_phone':
      addMessage('ai', data.reply)
      break

    case 'ask_date':
      addMessage('ai', data.reply)
      addDatePicker()
      break

    case 'ask_service':
      addMessage('ai', data.reply)
      addServicePicker()
      break

    case 'show_options':
      addMessage('ai', data.reply)
      if (data.options) {
        addQuickReplies(data.options.map(o => typeof o === 'string' ? { label: o, value: o } : o))
      }
      break

    default:
      addMessage('ai', data.reply)
      break
  }
}

/* ── QUICK REPLIES ── */
function addQuickReplies(options) {
  removeExtras()

  const wrapper = document.createElement('div')
  wrapper.className = 'quick-replies'
  wrapper.id = 'quick-replies'

  options.forEach(opt => {
    const label = typeof opt === 'string' ? opt : opt.label
    const value = typeof opt === 'string' ? opt : opt.value

    const btn = document.createElement('button')
    btn.className   = 'qr-btn'
    btn.textContent = label
    btn.onclick = () => {
      removeExtras()
      document.getElementById('msg').value = value
      send()
    }
    wrapper.appendChild(btn)
  })

  messagesEl.appendChild(wrapper)
  scrollBottom()
}

/* ── DATE PICKER ── */
function addDatePicker() {
  removeExtras()

  const today    = new Date(); today.setHours(0,0,0,0)
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']

  const wrapper = document.createElement('div')
  wrapper.className = 'date-picker-ui'
  wrapper.id = 'quick-replies'

  // Quick date buttons — next 6 days
  const pillsRow = document.createElement('div')
  pillsRow.className = 'dp-pills'

  for (let i = 0; i < 6; i++) {
    const d     = new Date(today); d.setDate(d.getDate() + i)
    const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : dayNames[d.getDay()]
    const val   = i === 0 ? 'today' : i === 1 ? 'tomorrow' : `${label} ${d.getDate()}/${d.getMonth()+1}`
    const btn   = document.createElement('button')
    btn.className = 'dp-pill'
    btn.innerHTML = `<span class="dp-pill-top">${label}</span><span class="dp-pill-bot">${d.getDate()}/${d.getMonth()+1}</span>`
    btn.onclick   = () => { removeExtras(); document.getElementById('msg').value = val; send() }
    pillsRow.appendChild(btn)
  }

  // Custom date input
  const customRow  = document.createElement('div')
  customRow.className = 'dp-custom'
  const minDate    = fmtDate(today)
  customRow.innerHTML = `
    <span class="dp-custom-label">Or pick:</span>
    <input type="date" class="dp-input" id="dp-custom-input" min="${minDate}">
    <button class="dp-go" onclick="pickCustomDate()">Go →</button>`

  wrapper.appendChild(pillsRow)
  wrapper.appendChild(customRow)
  messagesEl.appendChild(wrapper)
  scrollBottom()
}

function pickCustomDate() {
  const val = document.getElementById('dp-custom-input')?.value
  if (!val) return
  const d   = new Date(val + 'T00:00:00')
  const fmt = d.toLocaleDateString('en-GB', { day:'numeric', month:'long' })
  removeExtras()
  document.getElementById('msg').value = fmt
  send()
}

/* ── SERVICE PICKER ── */
async function addServicePicker() {
  removeExtras()

  const wrapper = document.createElement('div')
  wrapper.className = 'service-picker'
  wrapper.id = 'quick-replies'

  // Try to load real services from backend
  let services = cachedServices
  if (!services) {
    try {
      const res = await fetch(API_URL + '/public/clinic-info')
      const d   = await res.json()
      services  = d.services || []
      cachedServices = services
    } catch(e) {
      services = []
    }
  }

  // Fallback to common services if backend fails
  if (!services.length) {
    services = [
      { name: 'Checkup', duration_minutes: 30 },
      { name: 'Consultation', duration_minutes: 30 },
      { name: 'Tooth Cleaning', duration_minutes: 45 },
      { name: 'X-Ray', duration_minutes: 20 }
    ]
  }

  const SERVICE_ICONS = {
    'checkup':'🦷','tooth cleaning':'✨','cleaning':'✨','root canal':'🔧',
    'braces':'😁','whitening':'⭐','extraction':'🩺','filling':'🔩',
    'crown':'👑','implant':'🦿','consultation':'💬','general':'🩺',
    'blood test':'🩸','injection':'💉','vaccine':'💉','x-ray':'🔬',
    'xray':'🔬','eye test':'👁️','skin':'🧴','physio':'🏃','default':'💊'
  }

  function svcIcon(name) {
    const k = name.toLowerCase()
    return SERVICE_ICONS[k] || Object.keys(SERVICE_ICONS).filter(x=>x!=='default').find(key=>k.includes(key)) && SERVICE_ICONS[Object.keys(SERVICE_ICONS).filter(x=>x!=='default').find(key=>k.includes(key))] || SERVICE_ICONS.default
  }

  services.forEach(s => {
    const btn = document.createElement('button')
    btn.className = 'svc-btn'
    btn.innerHTML = `<span class="svc-icon">${svcIcon(s.name)}</span><span class="svc-name">${esc(s.name)}</span><span class="svc-dur">${s.duration_minutes}min</span>`
    btn.onclick   = () => { removeExtras(); document.getElementById('msg').value = s.name; send() }
    wrapper.appendChild(btn)
  })

  messagesEl.appendChild(wrapper)
  scrollBottom()
}

/* ── REMOVE ALL EXTRAS ── */
function removeExtras() {
  document.getElementById('quick-replies')?.remove()
}

/* ── HELPERS ── */
let cachedServices = null

function fmtDate(d) { return d.toISOString().split('T')[0] }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight }

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 100) + 'px'
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
}

function showTyping() {
  const row = document.createElement('div')
  row.className = 'typing-row'
  row.id = 'typing'

  const icon = document.createElement('div')
  icon.className = 'msg-icon ai-icon'
  icon.textContent = '🤖'

  const bubble = document.createElement('div')
  bubble.className = 'typing-bubble'
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'

  row.appendChild(icon)
  row.appendChild(bubble)
  messagesEl.appendChild(row)
  scrollBottom()
}

function hideTyping() {
  const t = document.getElementById('typing')
  if (t) t.remove()
}

/* ── SEND TEXT ── */
async function send() {
  const textarea = document.getElementById('msg')
  const text = textarea.value.trim()
  if (!text) return

  addMessage('user', text)
  textarea.value = ''
  textarea.style.height = 'auto'
  removeExtras()
  showTyping()

  try {
    const res  = await fetch(API_URL + '/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, userId })
    })
    const data = await res.json()
    hideTyping()
    handleResponse(data)
  } catch (e) {
    hideTyping()
    addMessage('ai', 'Sorry, could not connect to the server. Please try again.')
  }
}

function quickSend(text) {
  document.getElementById('msg').value = text
  send()
}

/* ── VOICE INPUT ── */
let recognition = null
let isListening = false

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addMessage('ai', "Sorry, voice input isn't supported in your browser. Try Chrome or Safari.")
    return
  }

  if (isListening) {
    stopVoice()
    return
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
  recognition = new SpeechRecognition()
  recognition.continuous     = false
  recognition.interimResults = true
  recognition.maxAlternatives = 1

  // Detect language from session (set by server) — default to en-IN for India
  const lang = document.documentElement.lang || 'en-IN'
  recognition.lang = lang === 'hi' ? 'hi-IN'
    : lang === 'mr' ? 'mr-IN'
    : lang === 'gu' ? 'gu-IN'
    : 'en-IN'

  recognition.onstart = () => {
    isListening = true
    const btn  = document.getElementById('mic-btn')
    const hint = document.getElementById('input-hint')
    btn.style.background   = '#ef4444'
    btn.style.animation    = 'pulse 1s infinite'
    btn.querySelector('svg').style.fill = 'white'
    hint.textContent       = '🎤 Listening… tap mic to stop'
    hint.style.color       = '#ef4444'
  }

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript
    const isFinal    = event.results[0].isFinal
    document.getElementById('msg').value = transcript
    autoResize(document.getElementById('msg'))

    if (isFinal) {
      stopVoice()
      setTimeout(() => send(), 300)
    }
  }

  recognition.onerror = (e) => {
    stopVoice()
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      addMessage('ai', `Voice error: ${e.error}. Try typing instead.`)
    }
  }

  recognition.onend = () => stopVoice()

  recognition.start()
}

function stopVoice() {
  isListening = false
  if (recognition) { try { recognition.stop() } catch(e) {} }
  const btn  = document.getElementById('mic-btn')
  const hint = document.getElementById('input-hint')
  if (btn) {
    btn.style.background = 'var(--brand-soft)'
    btn.style.animation  = 'none'
    btn.querySelector('svg').style.fill = 'var(--brand)'
  }
  if (hint) {
    hint.textContent  = 'Press Enter to send · Shift+Enter for new line'
    hint.style.color  = ''
  }
}

let depositConfig = null

// Load deposit config on startup
fetch(API_URL + '/payment/deposit-amount')
  .then(r => r.json())
  .then(d => { depositConfig = d })
  .catch(() => {})

async function checkAndShowPayment(data) {
  if (!depositConfig?.enabled || !depositConfig?.amount || !depositConfig?.configured) return

  // Extract ref ID from the booking confirmation message
  const refMatch = data.reply?.match(/Ref #\s*:\s*(\d+)/)
  const refId    = refMatch ? refMatch[1] : null

  // Show payment card
  showPaymentCard(depositConfig.amount, refId, data)
}

function showPaymentCard(amount, refId, bookingData) {
  removeExtras()

  card.id = 'payment-card'
  card.style.cssText = `

    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border-radius: 14px;
    padding: 18px 20px;
    color: white;

  `
  card.innerHTML = `

    <div style="font-size:18px;font-weight:700;margin-bottom:4px">Pay ₹${amount} deposit</div>
    <div style="font-size:12.5px;opacity:.85;margin-bottom:16px;line-height:1.5">
      A refundable deposit secures your appointment slot and reduces wait times.
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button onclick="startPayment(${amount},'${refId || ''}',this)" style="flex:1;padding:10px;background:white;color:#0ea5e9;border:none;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;min-width:120px">
        💳 Pay Now
      </button>
      <button onclick="this.closest('#payment-card').remove()" style="padding:10px 16px;background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:9px;font-family:inherit;font-size:13px;cursor:pointer">
        Skip
      </button>
    </div>
    <div id="payment-status" style="font-size:12px;margin-top:10px;min-height:16px;opacity:.85"></div>
  `
  messagesEl.appendChild(card)
  scrollBottom()
}

async function startPayment(amount, refId, btn) {
  btn.disabled = true
  btn.textContent = 'Loading…'
  const statusEl = document.getElementById('payment-status')

  try {
    // Create Razorpay order
    const res  = await fetch(API_URL + '/payment/create-order', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ amount, booking_ref: refId })
    })
    const order = await res.json()
    if (!res.ok) throw new Error(order.error || 'Could not create order')

    // Load Razorpay script
    if (!window.Razorpay) {
      await new Promise((resolve, reject) => {
        const s    = document.createElement('script')
        s.src      = 'https://checkout.razorpay.com/v1/checkout.js'
        s.onload   = resolve
        s.onerror  = reject
        document.head.appendChild(s)
      })
    }

    // Open Razorpay checkout
    const rzp = new window.Razorpay({
      key:         order.key_id,
      amount:      order.amount,
      currency:    order.currency,
      order_id:    order.order_id,
      name:        document.title || 'ClinicAI',
      description: 'Appointment Deposit',
      theme:       { color: '#0ea5e9' },
      handler: async (response) => {
        statusEl.textContent = '⏳ Verifying payment…'

        const verifyRes = await fetch(API_URL + '/payment/verify', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            razorpay_order_id:   response.razorpay_order_id,
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_signature:  response.razorpay_signature,
            appointment_id:      refId
          })
        })
        const verifyData = await verifyRes.json()

        if (verifyData.success) {
          statusEl.textContent = '✅ Payment successful! Your slot is confirmed.'
          statusEl.style.color = '#6ee7b7'
          btn.textContent      = '✅ Paid'
          btn.style.background = '#6ee7b7'
          btn.style.color      = '#065f46'
        } else {
          statusEl.textContent = '❌ Verification failed. Please contact the clinic.'
          btn.disabled         = false
          btn.textContent      = '💳 Retry'
        }
      },
      modal: {
        ondismiss: () => {
          btn.disabled    = false
          btn.textContent = '💳 Pay Now'
        }
      }
    })

    rzp.open()

  } catch(e) {
    if (statusEl) statusEl.textContent = '❌ ' + e.message
    btn.disabled    = false
    btn.textContent = '💳 Try Again'
  }
}
