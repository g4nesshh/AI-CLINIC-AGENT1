<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicAI — Book Your Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f0f4f8;
  --white:      #ffffff;
  --brand:      #0ea5e9;
  --brand-dark: #0284c7;
  --brand-soft: #e0f2fe;
  --text:       #0f172a;
  --muted:      #94a3b8;
  --border:     #e2e8f0;
  --user-bg:    #0ea5e9;
  --user-text:  #ffffff;
  --ai-bg:      #f8fafc;
  --shadow:     0 20px 60px rgba(14,165,233,0.12), 0 4px 16px rgba(0,0,0,0.06);
  --slot-bg:    #f0f9ff;
  --slot-border:#bae6fd;
  --slot-hover: #0ea5e9;
  --slot-sel:   #0ea5e9;
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 500px; height: 500px;
  background: rgba(14,165,233,0.1);
  top: -100px; left: -100px;
}
body::after {
  width: 400px; height: 400px;
  background: rgba(16,185,129,0.08);
  bottom: -80px; right: -80px;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  animation: riseIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
  transform: translateY(24px);
}

@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

.card {
  background: var(--white);
  border-radius: 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  height: 620px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.8);
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  padding: 20px 22px 18px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  top: -80px; right: -40px;
}
.header-top { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.2);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  backdrop-filter: blur(4px);
  flex-shrink: 0;
}
.header-info h2 { font-size: 15px; font-weight: 600; color: white; letter-spacing: -0.3px; }
.header-info p  { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.online-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  animation: blink 2s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.chips { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
.chip {
  padding: 5px 12px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 99px;
  font-size: 11.5px;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}
.chip:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── BUBBLES ── */
.msg-row {
  display: flex;
  gap: 8px;
  animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-row.user-row { flex-direction: row-reverse; }
.msg-icon {
  width: 30px; height: 30px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ai-icon   { background: var(--brand-soft); }
.user-icon { background: var(--brand); }

.bubble {
  max-width: 82%;
  padding: 11px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.55;
}
.ai-bubble {
  background: var(--ai-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.user-bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-bottom-right-radius: 4px;
}
.bubble-time {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
}
.user-row .bubble-time { color: rgba(255,255,255,0.6); }

/* ── SLOT PICKER ── */
.slot-wrapper {
  display: flex;
  gap: 8px;
  animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0;
}

.slot-card {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 12px 14px 14px;
  max-width: 82%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.slot-label {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.5;
}

.slot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}

.slot-btn {
  padding: 8px 4px;
  background: var(--slot-bg);
  border: 1.5px solid var(--slot-border);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: #0369a1;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  font-weight: 500;
  position: relative;
  overflow: hidden;
}

.slot-btn:hover {
  background: var(--slot-hover);
  border-color: var(--slot-hover);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(14,165,233,0.25);
}

.slot-btn:active { transform: scale(0.96); }

.slot-btn.selected {
  background: var(--slot-sel);
  border-color: var(--slot-sel);
  color: white;
  box-shadow: 0 4px 12px rgba(14,165,233,0.3);
}

.slot-btn.selected::after {
  content: '✓';
  position: absolute;
  top: 2px; right: 5px;
  font-size: 9px;
  font-family: sans-serif;
}

.slot-time { font-size: 13px; }
.slot-period { font-size: 10px; opacity: 0.75; display: block; margin-top: 1px; }

.slot-bubble-time {
  font-size: 10.5px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ── TYPING ── */
.typing-row { display: flex; gap: 8px; align-items: flex-end; }
.typing-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 12px 16px;
  display: flex; gap: 4px; align-items: center;
}
.dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ── DATE DIVIDER ── */
.date-divider {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; color: var(--muted); margin: 4px 0;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── INPUT ── */
.input-area { padding: 12px 14px 14px; border-top: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-row:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
textarea {
  flex: 1; border: none; background: transparent;
  font-family: 'Sora', sans-serif;
  font-size: 13.5px; color: var(--text);
  resize: none; outline: none;
  line-height: 1.5; max-height: 100px; min-height: 22px; overflow-y: auto;
}
textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 36px; height: 36px;
  background: var(--brand); border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.send-btn:hover  { background: var(--brand-dark); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.input-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

</style>
</head>
<body>

<div class="wrapper">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <div class="header-top">
        <div class="avatar">🏥</div>
        <div class="header-info">
          <h2>ClinicAI Receptionist</h2>
          <p><span class="online-dot"></span> Online — here to help</p>
        </div>
      </div>
      <div class="chips">
        <div class="chip" onclick="quickSend('Book an appointment')">📅 Book Appointment</div>
        <div class="chip" onclick="quickSend('What are your clinic hours?')">🕐 Clinic Hours</div>
        <div class="chip" onclick="quickSend('What services do you offer?')">💊 Services</div>
        <div class="chip" onclick="window.location.href='/'">🏥 About Us</div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="date-divider">Today</div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="msg"
          placeholder="Type your message…"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>

  </div>
</div>

<script>

// ── CHANGE THIS to your Render backend URL after deploying ──
const API_URL = 'https://ai-clinic-backend-xe19.onrender.com'

const userId     = Math.random().toString(36).substring(2)
const messagesEl = document.getElementById('messages')

/* ── WELCOME ── */
window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage('ai', 'Hello! 👋 Welcome to our clinic. I can help you book an appointment, answer questions about our services, or check available time slots.\n\nHow can I help you today?')

    // Handle prefill from clinic info page
    const params  = new URLSearchParams(window.location.search)
    const prefill = params.get('prefill')
    if (prefill) {
      setTimeout(() => {
        document.getElementById('msg').value = decodeURIComponent(prefill)
        send()
      }, 600)
    }
  }, 400)
})

/* ── TIME HELPERS ── */
function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
}

function to12hr(t) {
  const [h, m] = t.split(':').map(Number)
  const period = h >= 12 ? 'PM' : 'AM'
  const h12    = h % 12 || 12
  return { display: `${h12}:${m.toString().padStart(2,'0')}`, period }
}

/* ── ADD TEXT MESSAGE ── */
function addMessage(type, text) {
  const row  = document.createElement('div')
  row.className = `msg-row ${type === 'user' ? 'user-row' : ''}`

  const icon = document.createElement('div')
  icon.className = `msg-icon ${type === 'ai' ? 'ai-icon' : 'user-icon'}`
  icon.textContent = type === 'ai' ? '🤖' : '👤'

  const right  = document.createElement('div')
  const bubble = document.createElement('div')
  bubble.className = `bubble ${type === 'ai' ? 'ai-bubble' : 'user-bubble'}`
  bubble.textContent = text

  const timeEl = document.createElement('div')
  timeEl.className = 'bubble-time'
  timeEl.textContent = nowTime()

  right.appendChild(bubble)
  right.appendChild(timeEl)

  if (type === 'ai') { row.appendChild(icon); row.appendChild(right) }
  else               { row.appendChild(right); row.appendChild(icon) }

  messagesEl.appendChild(row)
  scrollBottom()
}

/* ── ADD SLOT PICKER ── */
function addSlotPicker(labelText, slots, slotDate) {
  const wrapper = document.createElement('div')
  wrapper.className = 'slot-wrapper'

  const icon = document.createElement('div')
  icon.className = 'msg-icon ai-icon'
  icon.textContent = '🤖'

  const card = document.createElement('div')
  card.className = 'slot-card'

  const label = document.createElement('div')
  label.className = 'slot-label'
  label.textContent = labelText
  card.appendChild(label)

  const grid = document.createElement('div')
  grid.className = 'slot-grid'

  slots.forEach(slot => {
    const btn = document.createElement('button')
    btn.className = 'slot-btn'

    const t = to12hr(slot)
    btn.innerHTML = `<span class="slot-time">${t.display}</span><span class="slot-period">${t.period}</span>`

    btn.onclick = () => {
      grid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      const msg = slotDate
        ? `I'd like to book at ${slot} on ${slotDate}`
        : slot
      setTimeout(() => sendSlot(msg, slot), 200)
    }

    grid.appendChild(btn)
  })

  card.appendChild(grid)

  const timeEl = document.createElement('div')
  timeEl.className = 'slot-bubble-time'
  timeEl.textContent = nowTime()
  card.appendChild(timeEl)

  wrapper.appendChild(icon)
  wrapper.appendChild(card)
  messagesEl.appendChild(wrapper)
  scrollBottom()
}

/* ── SEND SLOT SELECTION ── */
async function sendSlot(message, displayTime) {
  addMessage('user', `Selected: ${displayTime}`)
  showTyping()

  try {
    const res  = await fetch(API_URL + '/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message, userId })
    })
    const data = await res.json()
    hideTyping()
    handleResponse(data)
  } catch (e) {
    hideTyping()
    addMessage('ai', 'Sorry, could not connect to the server. Please try again.')
  }
}

/* ── HANDLE SERVER RESPONSE ── */
function handleResponse(data) {
  const action = data.action || (data.slots && data.slots.length > 0 ? 'show_slots' : 'chat')

  switch (action) {

    case 'show_slots':
      addSlotPicker(data.reply, data.slots, data.slotDate || null)
      break

    case 'show_summary':
      addMessage('ai', data.reply)
      addQuickReplies(['✅ Yes, confirm', '❌ No, change something'])
      break

    case 'confirmed':
      addMessage('ai', data.reply)
      addQuickReplies(['📅 Book another appointment', '🔍 Check my appointments'])
      break

    case 'cancelled':
      addMessage('ai', data.reply)
      addQuickReplies(['📅 Book new appointment', '🔍 Check my appointments'])
      break

    case 'ask_date':
      addMessage('ai', data.reply)
      addQuickReplies(['Today', 'Tomorrow', 'Next Monday', 'Next Saturday'])
      break

    case 'ask_service':
      addMessage('ai', data.reply)
      addQuickReplies(['Checkup', 'Tooth Cleaning', 'Consultation', 'X-Ray'])
      break

    case 'show_options':
      addMessage('ai', data.reply)
      if (data.options) addQuickReplies(data.options)
      break

    default:
      addMessage('ai', data.reply)
      break
  }
}

/* ── TYPING INDICATOR ── */
function showTyping() {
  const row = document.createElement('div')
  row.className = 'typing-row'
  row.id = 'typing'

  const icon = document.createElement('div')
  icon.className = 'msg-icon ai-icon'
  icon.textContent = '🤖'

  const bubble = document.createElement('div')
  bubble.className = 'typing-bubble'
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'

  row.appendChild(icon)
  row.appendChild(bubble)
  messagesEl.appendChild(row)
  scrollBottom()
}

function hideTyping() {
  const t = document.getElementById('typing')
  if (t) t.remove()
}

/* ── SEND TEXT ── */
async function send() {
  const textarea = document.getElementById('msg')
  const text = textarea.value.trim()
  if (!text) return

  addMessage('user', text)
  textarea.value = ''
  textarea.style.height = 'auto'
  // Remove quick reply buttons when user types
  const qr = document.getElementById('quick-replies')
  if (qr) qr.remove()
  showTyping()

  try {
    const res  = await fetch(API_URL + '/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, userId })
    })
    const data = await res.json()
    hideTyping()
    handleResponse(data)
  } catch (e) {
    hideTyping()
    addMessage('ai', 'Sorry, could not connect to the server. Please try again.')
  }
}

function quickSend(text) {
  document.getElementById('msg').value = text
  send()
}

/* ── HELPERS ── */
/* ── QUICK REPLIES ── */
function addQuickReplies(options) {
  // Remove any existing quick replies first
  const existing = document.getElementById('quick-replies')
  if (existing) existing.remove()

  const wrapper = document.createElement('div')
  wrapper.id = 'quick-replies'
  wrapper.style.cssText = 'display:flex;flex-wrap:wrap;gap:7px;padding:4px 16px 8px;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0'

  options.forEach(option => {
    const btn = document.createElement('button')
    btn.textContent = option
    btn.style.cssText = `
      padding: 7px 14px;
      background: var(--brand-soft);
      border: 1.5px solid var(--brand);
      border-radius: 99px;
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      color: var(--brand-dark);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    `
    btn.onmouseover = () => { btn.style.background = 'var(--brand)'; btn.style.color = 'white' }
    btn.onmouseout  = () => { btn.style.background = 'var(--brand-soft)'; btn.style.color = 'var(--brand-dark)' }
    btn.onclick = () => {
      wrapper.remove()
      document.getElementById('msg').value = option
      send()
    }
    wrapper.appendChild(btn)
  })

  messagesEl.appendChild(wrapper)
  scrollBottom()
}

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight }

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 100) + 'px'
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
}

</script>
</body>
</html>
