<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — ClinicAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.icon{font-size:72px;margin-bottom:20px}
.code{font-size:80px;font-weight:600;color:#3b82f6;letter-spacing:-4px;margin-bottom:8px}
.title{font-size:22px;font-weight:600;margin-bottom:8px}
.sub{font-size:14px;color:#64748b;margin-bottom:32px;line-height:1.6}
.links{display:flex;flex-direction:column;gap:10px;max-width:260px;margin:0 auto}
a{display:block;padding:11px 20px;border-radius:9px;text-decoration:none;font-size:14px;font-weight:500;transition:opacity .15s}
a:hover{opacity:.85}
.primary{background:#3b82f6;color:white}
.ghost{background:#1e2435;color:#94a3b8;border:1px solid #262d3d}
</style>
</head>
<body>
<div>
  <div class="icon">🔍</div>
  <div class="code">404</div>
  <div class="title">Page not found</div>
  <div class="sub">The page you're looking for doesn't exist.<br>It may have moved or been deleted.</div>
  <div class="links">
    <a class="primary" href="/">🏥 Go to Clinic Page</a>
    <a class="ghost"    href="/chat.html">💬 Open Chat</a>
    <a class="ghost"    href="/admin.html">⚙️ Admin Panel</a>
  </div>
</div>
</body>
</html>
